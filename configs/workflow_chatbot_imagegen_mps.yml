imagegen1:
    server_model: <MODELS_DIR>/stable-diffusion-3.5-medium-turbo
    # server_model: CompVis/stable-diffusion-v1-4
    num_requests: 5
    device: gpu
    type: imagegen
    mps: 100

chat1:
    server_model: models/Llama-3.2-3B-Instruct-GGUF/Llama-3.2-3B-Instruct-f16.gguf
    client_model: openai/meta-llama/Llama-3.2-3B-Instruct
    num_requests: 10
    device: gpu
    type: chatbot
    mps: 100

workflows:
    generate_image:
        uses: imagegen1

    chat_summary:
        uses: chat1